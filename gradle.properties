# --- Gradle Performance ---
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configuration-cache=true
org.gradle.configuration-cache.problems=warn
org.gradle.vfs.watch=true

# --- JBR 25 (DCEVM for Hot Reload) ---
org.gradle.java.home=/opt/jbr-25

# --- Memory ---
org.gradle.jvmargs=-Xmx4g -XX:+UseG1GC -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8 -XX:+AllowEnhancedClassRedefinition
kotlin.daemon.jvmargs=-Xmx2g -XX:+UseG1GC -XX:+AllowEnhancedClassRedefinition
org.gradle.daemon.idletimeout=1800000

# --- Kotlin ---
kotlin.incremental=true
